spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/coreto}
    username: ${DB_USER:coreto}
    password: ${DB_PASSWORD:coreto123}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  devtools:
    restart:
      enabled: true
      poll-interval: 2s
      quiet-period: 1s
