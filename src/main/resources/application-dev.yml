spring:
  datasource:
    url: jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:coreto}
    username: ${PGUSER:coreto}
    password: ${PGPASSWORD:coreto123}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  devtools:
    restart:
      enabled: true
      poll-interval: 2s
      quiet-period: 1s
