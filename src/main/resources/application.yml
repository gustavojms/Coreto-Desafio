spring:
  application:
    name: coreto-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/coreto}
    username: ${DB_USER:coreto}
    password: ${DB_PASSWORD:coreto123}
    hikari:
      maximum-pool-size: 10
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

rsa:
  public-key: ${RSA_PUBLIC_KEY:classpath:certs/public.pem}
  private-key: ${RSA_PRIVATE_KEY:classpath:certs/private.pem}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

server:
  port: 8080

logging:
  level:
    br.com.coreto: DEBUG
    org.springframework.security: INFO
