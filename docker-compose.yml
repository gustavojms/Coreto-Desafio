services:
  postgres:
    image: postgres:17
    container_name: coreto-db
    environment:
      POSTGRES_DB: coreto
      POSTGRES_USER: coreto
      POSTGRES_PASSWORD: coreto123
    ports:
      - "5432:5432"
    volumes:
      - coreto_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coreto -d coreto"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Production: multi-stage build, JRE-only, no source code
  api:
    build: .
    container_name: coreto-api
    profiles: ["prod"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/coreto
      DB_USER: coreto
      DB_PASSWORD: coreto123
      RSA_PUBLIC_KEY: file:/app/certs/public.pem
      RSA_PRIVATE_KEY: file:/app/certs/private.pem
    ports:
      - "8080:8080"

  # Development: hot reload via Spring DevTools, source mounted
  api-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: coreto-api-dev
    profiles: ["dev"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_URL: jdbc:postgresql://postgres:5432/coreto
      DB_USER: coreto
      DB_PASSWORD: coreto123
      RSA_PUBLIC_KEY: file:/app/certs/public.pem
      RSA_PRIVATE_KEY: file:/app/certs/private.pem
    ports:
      - "8080:8080"
    volumes:
      - ./src:/app/src
      - ./pom.xml:/app/pom.xml

volumes:
  coreto_data:
